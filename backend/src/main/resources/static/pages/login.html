<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akiba Hub - Login</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>🗳️ Akiba Hub</h1>
            <p class="subtitle">Secure Student Chama Management</p>
            
            <!-- Google OAuth Button -->
            <a href="https://akibahub.unitybridge.dev/oauth2/authorization/google" class="google-btn">
                <img src="https://img.icons8.com/color/16/000000/google-logo.png" alt="Google">
                Sign in with Google
            </a>
            
            <div class="divider">or</div>
            
            <!-- Manual Login -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
            
            <p class="register-link">
                Don't have an account? <a href="#" onclick="showRegister()">Register</a>
            </p>
            
            <!-- Registration Form (hidden by default) -->
            <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <button type="submit">Create Account</button>
            </form>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const success = await auth.login(email, password);
            if (success) {
                window.location.href = 'dashboard.html';
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const success = await auth.register(email, password);
            if (success) {
                window.location.href = 'dashboard.html';
            }
        }
        
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.querySelector('.register-link').style.display = 'none';
        }
    </script>
</body>
</html>
