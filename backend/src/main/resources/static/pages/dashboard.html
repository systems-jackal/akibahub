<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Akiba Hub</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav>
        <h2>🗳️ Akiba Hub</h2>
        <div>
            <span id="userName">User</span>
            <button onclick="auth.logout()">Logout</button>
        </div>
    </nav>
    
    <div class="dashboard-container">
        <h1>Welcome, <span id="userNameDisplay"></span></h1>
        
        <div class="stats-grid">
            <div class="card" onclick="location.href='savings.html'">
                <div class="card-icon">💰</div>
                <h3>Personal Savings</h3>
                <p id="balanceDisplay">KES 0.00</p>
            </div>
            <div class="card" onclick="location.href='groups.html'">
                <div class="card-icon">👥</div>
                <h3>My Groups</h3>
                <p id="groupCount">0 Groups</p>
            </div>
            <div class="card" onclick="location.href='proposals.html'">
                <div class="card-icon">🗳️</div>
                <h3>Proposals</h3>
                <p id="proposalCount">0 Pending</p>
            </div>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        async function loadDashboard() {
            // Check if we have a token in the URL (OAuth redirect)
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            
            if (token) {
                // Store token in localStorage
                localStorage.setItem('token', token);
                // Clean URL by removing token parameter
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            
            // Initialize auth with token from localStorage
            const auth = new AuthManager();
            
            if (!auth.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            
            const user = auth.getUser();
            document.getElementById('userNameDisplay').innerText = user?.email || 'User';
            document.querySelector('#userName').innerText = user?.email || 'User';
            
            try {
                const response = await api.getBalance();
                if (response.success) {
                    document.getElementById('balanceDisplay').textContent = `KES ${parseFloat(response.data).toFixed(2)}`;
                }
            } catch(e) {
                console.error('Error loading balance:', e);
            }
        }
        
        // Make auth available globally for logout button
        window.auth = new AuthManager();
        
        window.onload = loadDashboard;
    </script>
</body>
</html>
