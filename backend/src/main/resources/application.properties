# ============================================
# AKIBA HUB - CONFIGURATION
# ============================================
# All values are read from environment variables.
# Set them in: .env (local) or systemd service (production)
# ============================================

server.port=${PORT:8080}
server.address=${ADDRESS:0.0.0.0}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.mariadb.jdbc.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}

# Actuator
management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health,info}
management.endpoint.health.show-details=${HEALTH_DETAILS:always}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=${GOOGLE_SCOPE:email,profile}

# PayHero
payhero.api.base-url=${PAYHERO_BASE_URL:https://api.sandbox.payhero.co.ke/v1}
payhero.api.key=${PAYHERO_API_KEY}

# CORS and Frontend
cors.allowed.origins=${CORS_ORIGINS}
frontend.url=${FRONTEND_URL}