# ============================================
# AKIBA HUB V2 - CONFIGURATION
# Values are loaded from .env via System.properties
# ============================================

server.port=8080

# Database (MariaDB)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.mariadb.jdbc.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.MariaDBDialect}
spring.jpa.show-sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# PayHero
payhero.api.base-url=${PAYHERO_BASE_URL:https://api.sandbox.payhero.co.ke/v1}
payhero.api.key=${PAYHERO_API_KEY:}

# CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5500,http://127.0.0.1:5500}
frontend.url=${FRONTEND_URL:http://localhost:5500}