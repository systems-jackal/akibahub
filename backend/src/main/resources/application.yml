spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/akibahub?useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.mariadb.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevOnly}
  expiration: ${JWT_EXPIRATION:86400000}   # 24 hours default

server:
  port: ${PORT:8080}

# Actuator endpoints configuration – health is now publicly accessible
management:
  endpoints:
    web:
      exposure:
        include: health, info