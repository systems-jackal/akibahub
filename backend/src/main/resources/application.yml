server:
  port: 8080
  error:
    include-stacktrace: never
    include-exception: false

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/akibahub
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      # Was "update" - Hibernate silently altering the schema on every
      # boot, with zero history of what changed or when. Flyway now owns
      # all schema changes (see migrations in db/migration); Hibernate's
      # only job is to confirm the entities still match what Flyway
      # created. If they don't match, the app fails to start instead of
      # silently drifting.
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate lets Flyway adopt an existing database that was
    # previously managed by ddl-auto:update (i.e. your current dev/staging
    # DB) without erroring out because the tables "already exist" - it
    # marks whatever's there as baseline version 0, then V1 below is
    # written to match that existing schema exactly, so it's a no-op on
    # an already-baselined DB and a real CREATE on a brand new one.
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  secret: change-this-to-a-very-long-random-secret-key!!
  # Was a single 1-hour token with no way to revoke it early. Now that
  # refresh tokens exist (see RefreshTokenService) to cover renewing the
  # session, the access token itself can be short-lived - this limits how
  # long a stolen access token remains useful, without making the user
  # log in constantly.
  access-token-expiration-ms: 900000       # 15 minutes
  refresh-token-expiration-days: 30

rate-limit:
  auth:
    capacity: 10
    refill-period-seconds: 60

security:
  # Only requests whose IMMEDIATE TCP peer is one of these addresses are
  # allowed to have their X-Forwarded-For header trusted. This should be
  # the address(es) of your own reverse proxy (nginx), never a wildcard.
  # Backend sits behind nginx on the same host, so nginx's connection to
  # the backend arrives from localhost.
  trusted-proxies: ${TRUSTED_PROXIES:127.0.0.1,::1}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html