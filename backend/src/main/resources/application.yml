server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/akibahub
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: change-this-to-a-very-long-random-secret-key!!
  expiration: 3600000

rate-limit:
  auth:
    capacity: 10          # max burst
    refill-period-seconds: 60   # period in seconds

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html