services:
  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    # Intentionally no host port publish — MariaDB stays on akiba-net only.
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - akiba-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/systems-jackal/akibahub-backend:latest
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${MYSQL_DATABASE:-akibahub}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PAYMENTS_MODE: ${PAYMENTS_MODE:-demo}
      APP_BASE_URL: ${APP_BASE_URL:-https://akiba.unitybridge.dev}
      PAYHERO_AUTH_TOKEN: ${PAYHERO_AUTH_TOKEN:-}
      PAYHERO_CHANNEL_ID: ${PAYHERO_CHANNEL_ID:-}
    networks:
      - akiba-net
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

networks:
  akiba-net:

volumes:
  db_data:
