
services:

  # ── Databases ──────────────────────────────────────────────────────────────
  mariadb-auth:
    image: mariadb:10.11
    container_name: akiba-db-auth
    restart: on-failure:5
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: akiba_auth
      MYSQL_USER: akiba_auth_user
      MYSQL_PASSWORD: ${MARIADB_AUTH_PASSWORD}
    volumes:
      - db-auth:/var/lib/mysql
      - ./database/auth-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "--password=$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mariadb-savings:
    image: mariadb:10.11
    container_name: akiba-db-savings
    restart: on-failure:5
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: akiba_savings
      MYSQL_USER: akiba_savings_user
      MYSQL_PASSWORD: ${MARIADB_SAVINGS_PASSWORD}
    volumes:
      - db-savings:/var/lib/mysql
      - ./database/savings-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "--password=$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mariadb-groups:
    image: mariadb:10.11
    container_name: akiba-db-groups
    restart: on-failure:5
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: akiba_groups
      MYSQL_USER: akiba_groups_user
      MYSQL_PASSWORD: ${MARIADB_GROUPS_PASSWORD}
    volumes:
      - db-groups:/var/lib/mysql
      - ./database/groups-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "--password=$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mariadb-payments:
    image: mariadb:10.11
    container_name: akiba-db-payments
    restart: on-failure:5
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: akiba_payments
      MYSQL_USER: akiba_payments_user
      MYSQL_PASSWORD: ${MARIADB_PAYMENTS_PASSWORD}
    volumes:
      - db-payments:/var/lib/mysql
      - ./database/payments-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "--password=$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mariadb-proposals:
    image: mariadb:10.11
    container_name: akiba-db-proposals
    restart: on-failure:5
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: akiba_proposals
      MYSQL_USER: akiba_proposals_user
      MYSQL_PASSWORD: ${MARIADB_PROPOSALS_PASSWORD}
    volumes:
      - db-proposals:/var/lib/mysql
      - ./database/proposals-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "--password=$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mariadb-audit:
    image: mariadb:10.11
    container_name: akiba-db-audit
    restart: on-failure:5
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: akiba_audit
      MYSQL_USER: akiba_audit_user
      MYSQL_PASSWORD: ${MARIADB_AUDIT_PASSWORD}
    volumes:
      - db-audit:/var/lib/mysql
      - ./database/audit-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "--password=$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Message Broker ─────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: akiba-rabbitmq
    restart: on-failure:5
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Services ───────────────────────────────────────────────────────────────
  auth-service:
    image: ghcr.io/${GITHUB_REPO}/auth-service:latest
    container_name: akiba-auth
    restart: on-failure:5
    stop_grace_period: 30s
    depends_on:
      mariadb-auth:
        condition: service_healthy
    environment:
      DB_HOST: mariadb-auth
      DB_NAME: akiba_auth
      DB_USER: akiba_auth_user
      DB_PASSWORD: ${MARIADB_AUTH_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseContainerSupport"
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  audit-service:
    image: ghcr.io/${GITHUB_REPO}/audit-service:latest
    container_name: akiba-audit
    restart: on-failure:5
    stop_grace_period: 30s
    depends_on:
      mariadb-audit:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: mariadb-audit
      DB_NAME: akiba_audit
      DB_USER: akiba_audit_user
      DB_PASSWORD: ${MARIADB_AUDIT_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseContainerSupport"
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:8086/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  savings-service:
    image: ghcr.io/${GITHUB_REPO}/savings-service:latest
    container_name: akiba-savings
    restart: on-failure:5
    stop_grace_period: 30s
    depends_on:
      mariadb-savings:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    environment:
      DB_HOST: mariadb-savings
      DB_NAME: akiba_savings
      DB_USER: akiba_savings_user
      DB_PASSWORD: ${MARIADB_SAVINGS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      PAYMENT_SERVICE_HOST: payment-service
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseContainerSupport"
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  group-service:
    image: ghcr.io/${GITHUB_REPO}/group-service:latest
    container_name: akiba-group
    restart: on-failure:5
    stop_grace_period: 30s
    depends_on:
      mariadb-groups:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    environment:
      DB_HOST: mariadb-groups
      DB_NAME: akiba_groups
      DB_USER: akiba_groups_user
      DB_PASSWORD: ${MARIADB_GROUPS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseContainerSupport"
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  payment-service:
    image: ghcr.io/${GITHUB_REPO}/payment-service:latest
    container_name: akiba-payment
    restart: on-failure:5
    stop_grace_period: 30s
    depends_on:
      mariadb-payments:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    environment:
      DB_HOST: mariadb-payments
      DB_NAME: akiba_payments
      DB_USER: akiba_payments_user
      DB_PASSWORD: ${MARIADB_PAYMENTS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      PAYHERO_USERNAME: ${PAYHERO_USERNAME}
      PAYHERO_PASSWORD: ${PAYHERO_PASSWORD}
      PAYHERO_CHANNEL_ID: ${PAYHERO_CHANNEL_ID}
      APP_BASE_URL: ${APP_BASE_URL}
      SAVINGS_SERVICE_HOST: savings-service
      GROUP_SERVICE_HOST: group-service
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseContainerSupport"
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  proposal-service:
    image: ghcr.io/${GITHUB_REPO}/proposal-service:latest
    container_name: akiba-proposal
    restart: on-failure:5
    stop_grace_period: 30s
    depends_on:
      mariadb-proposals:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      group-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    environment:
      DB_HOST: mariadb-proposals
      DB_NAME: akiba_proposals
      DB_USER: akiba_proposals_user
      DB_PASSWORD: ${MARIADB_PROPOSALS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      GROUP_SERVICE_HOST: group-service
      PAYMENT_SERVICE_HOST: payment-service
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseContainerSupport"
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  api-gateway:
    image: ghcr.io/${GITHUB_REPO}/api-gateway:latest
    container_name: akiba-gateway
    restart: on-failure:5
    stop_grace_period: 30s
    depends_on:
      auth-service:
        condition: service_healthy
      savings-service:
        condition: service_healthy
      group-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      proposal-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_HOST: auth-service
      SAVINGS_SERVICE_HOST: savings-service
      GROUP_SERVICE_HOST: group-service
      PAYMENT_SERVICE_HOST: payment-service
      PROPOSAL_SERVICE_HOST: proposal-service
      AUDIT_SERVICE_HOST: audit-service
      FRONTEND_URL: ${FRONTEND_URL}
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseContainerSupport"
    ports:
      - "127.0.0.1:8080:8080"
    networks: [akiba-internal]
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

networks:
  akiba-internal:
    driver: bridge

volumes:
  db-auth:
  db-savings:
  db-groups:
  db-payments:
  db-proposals:
  db-audit:
  rabbitmq-data:
