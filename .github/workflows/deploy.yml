name: Deploy to Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - api-gateway
          - audit-service
          - savings-service
          - group-service
          - payment-service
          - proposal-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: |
          cd services/${{ matrix.service }}
          mvn clean package -DskipTests

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            cat > ~/akibahub/infrastructure/.env << 'ENVEOF'
            GITHUB_REPO=systems-jackal/akibahub
            DOMAIN_NAME=akibahub.unitybridge.dev
            APP_BASE_URL=https://akibahub.unitybridge.dev
            FRONTEND_URL=https://akibahub.unitybridge.dev
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            INTERNAL_SERVICE_KEY=${{ secrets.INTERNAL_SERVICE_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            PAYHERO_USERNAME=${{ secrets.PAYHERO_USERNAME }}
            PAYHERO_PASSWORD=${{ secrets.PAYHERO_PASSWORD }}
            PAYHERO_CHANNEL_ID=${{ secrets.PAYHERO_CHANNEL_ID }}
            PAYHERO_CALLBACK_SECRET=${{ secrets.PAYHERO_CALLBACK_SECRET }}
            RABBITMQ_USER=akiba
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            MARIADB_ROOT_PASSWORD=${{ secrets.MARIADB_ROOT_PASSWORD }}
            MARIADB_AUTH_PASSWORD=${{ secrets.MARIADB_AUTH_PASSWORD }}
            MARIADB_SAVINGS_PASSWORD=${{ secrets.MARIADB_SAVINGS_PASSWORD }}
            MARIADB_GROUPS_PASSWORD=${{ secrets.MARIADB_GROUPS_PASSWORD }}
            MARIADB_PAYMENTS_PASSWORD=${{ secrets.MARIADB_PAYMENTS_PASSWORD }}
            MARIADB_PROPOSALS_PASSWORD=${{ secrets.MARIADB_PROPOSALS_PASSWORD }}
            MARIADB_AUDIT_PASSWORD=${{ secrets.MARIADB_AUDIT_PASSWORD }}
            ENVEOF
            echo "✓ .env written from GitHub Secrets"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e

            cd ~/akibahub
            git fetch origin && git reset --hard origin/main

            cp -r frontend/* /var/www/html/
            chown -R www-data:www-data /var/www/html
            chmod -R 755 /var/www/html
            echo "✓ Frontend deployed"

            cd infrastructure
            echo "${{ secrets.CR_PAT }}" | \
              docker login ghcr.io -u systems-jackal --password-stdin

            export GITHUB_REPO=${{ github.repository }}
            docker compose pull
            docker compose up -d --remove-orphans
            echo "✓ Containers restarted"

            echo "Waiting 180s for JVM startup..."
            sleep 180

            check_service() {
              svc_name=$1
              svc_port=$2
              result=$(wget -qO- "http://localhost:${svc_port}/actuator/health" 2>/dev/null || echo "")
              if echo "$result" | grep -q "UP"; then
                echo "✓ ${svc_name} healthy"
                return 0
              else
                echo "✗ ${svc_name} UNHEALTHY"
                docker compose logs --tail=20 "${svc_name}"
                return 1
              fi
            }

            failed=0
            check_service auth-service     8081 || failed=1
            check_service audit-service    8086 || failed=1
            check_service savings-service  8082 || failed=1
            check_service group-service    8083 || failed=1
            check_service payment-service  8084 || failed=1
            check_service proposal-service 8085 || failed=1
            check_service api-gateway      8080 || failed=1

            if [ "$failed" = "1" ]; then
              echo "Deployment failed — unhealthy services"
              exit 1
            fi

            echo "✓ All services healthy — deployment complete"
