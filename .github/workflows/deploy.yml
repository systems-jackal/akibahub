name: Deploy to Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - api-gateway
          - audit-service
          - savings-service
          - group-service
          - payment-service
          - proposal-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: |
          cd services/${{ matrix.service }}
          mvn clean package -DskipTests

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy infrastructure to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infrastructure/"
          target: "~/akibahub/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/akibahub/infrastructure

            # Login to ghcr
            echo "${{ secrets.CR_PAT }}" | \
              docker login ghcr.io -u systems-jackal --password-stdin

            # Set repo for compose
            export GITHUB_REPO=${{ github.repository }}

            # Pull latest images
            docker compose pull

            # Rolling restart
            docker compose up -d --remove-orphans

            # Wait for startup
            sleep 45

            # Health check all services
            declare -A services=(
              [auth-service]=8081
              [audit-service]=8086
              [savings-service]=8082
              [group-service]=8083
              [payment-service]=8084
              [proposal-service]=8085
              [api-gateway]=8080
            )

            failed=0
            for name in "${!services[@]}"; do
              port="${services[$name]}"
              if wget -qO- "http://localhost:$port/actuator/health" \
                  2>/dev/null | grep -q '"status":"UP"'; then
                echo "✓ $name healthy"
              else
                echo "✗ $name UNHEALTHY — check logs:"
                docker compose logs --tail=30 $name
                failed=1
              fi
            done

            if [ $failed -eq 1 ]; then
              echo "Deployment completed with unhealthy services"
              exit 1
            fi

            echo "✓ All services healthy — deployment complete"
