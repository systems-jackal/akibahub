name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - api-gateway
          - audit-service
          - savings-service
          - group-service
          - payment-service
          - proposal-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          mvn clean package -DskipTests

      - name: Test ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          mvn test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: services/${{ matrix.service }}/target/*.jar
          retention-days: 1
