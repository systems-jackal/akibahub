<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Akiba Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">🏦 Akiba Hub</div>
      <h2>Login</h2>
      <form id="login-form">
        <!-- Phone input (default) -->
        <div id="phone-login-group" class="form-group">
          <label for="phone-login">Phone Number</label>
          <div class="phone-input">
            <span class="prefix">+254</span>
            <input type="tel" id="phone-login" data-phone placeholder="712 345 678" autocomplete="tel-national">
          </div>
        </div>

        <!-- ID input (hidden initially) -->
        <div id="id-login-group" class="form-group hidden">
          <label for="id-login">ID Number</label>
          <input type="text" id="id-login" placeholder="12345678" pattern="\d{8}" inputmode="numeric">
        </div>

        <!-- Toggle link -->
        <p class="text-center mb-20">
          <a href="#" id="toggle-login-method">Login with ID Number instead</a>
        </p>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" required>
            <button type="button" class="toggle-password">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn-primary full-width">Login</button>
      </form>
      <p id="auth-message" class="mt-20"></p>
      <p class="mt-20">Don't have an account? <a href="register.html">Register</a></p>
      <a href="index.html" class="btn-outline">← Back to Home</a>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/login.js"></script>
</body>
</html>
