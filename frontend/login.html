<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akiba Hub | Access Your Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- Core Variables & Reset --- */
        :root {
            --bg-dark: #061a13;
            --bg-surface: #0a291e;
            --bg-surface-glass: rgba(10, 41, 30, 0.75);
            --gold-primary: #d4af37;
            --gold-bright: #f3cd4a;
            --gold-muted: #aa8c2c;
            --text-main: #f8f9fa;
            --text-muted: #a3b8b0;
            --border-color: rgba(212, 175, 55, 0.25);
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Particle Canvas Background --- */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0d3829 0%, #051610 100%);
        }

        /* --- Auth Card Wrapper --- */
        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 2rem 1.5rem;
            z-index: 10;
        }

        .auth-card {
            background: var(--bg-surface-glass);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 24px;
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .auth-header .logo span {
            color: var(--gold-bright);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* --- Form Fields --- */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .form-input {
            width: 100%;
            background: rgba(4, 18, 13, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 0.85rem 1rem;
            border-radius: 10px;
            color: #fff;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gold-bright);
            box-shadow: 0 0 10px rgba(243, 205, 74, 0.15);
            background: rgba(4, 18, 13, 0.8);
        }

        .form-group:focus-within label {
            color: var(--gold-bright);
        }

        /* --- Remember Me & Forgot Password Utilities --- */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-muted);
            -webkit-user-select: none;
            user-select: none;
        }

        .remember-me input {
            accent-color: var(--gold-primary);
            cursor: pointer;
        }

        .forgot-link {
            color: var(--gold-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--gold-bright);
        }

        /* --- Buttons --- */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-muted) 100%);
            color: #051610;
            padding: 0.9rem;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(212, 175, 55, 0.5);
        }

        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-switch a {
            color: var(--gold-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .auth-switch a:hover {
            color: var(--gold-bright);
        }

        /* --- Client Error Alert Alert --- */
        .error-alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            display: none;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="auth-container">
        <div class="auth-card">
            
            <div class="auth-header">
                <div class="logo">Akiba<span>Hub</span></div>
                <p>Welcome back! Secure access to your chama vault.</p>
            </div>

            <div class="error-alert" id="error-box"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Your Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="e.g. student@gmail.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        Keep me logged in
                    </label>
                    <a href="#" class="forgot-link" id="forgot-password-trigger">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary">Secure Log In</button>
            </form>

            <div class="auth-switch">
                New to the platform? <a href="register.html">Start a Chama</a>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            initParticleBackground();
            initFormSubmission();
            initForgotPasswordMock();
        });

        /* --- 1. Matching Majestic Floating Background Vectors --- */
        function initParticleBackground() {
            const canvas = document.getElementById("particle-canvas");
            if (!canvas) return;
            const ctx = canvas.getContext("2d");

            let particles = [];
            const particleCount = 35; 

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2.0 + 1.0;
                    this.speedX = Math.random() * 0.2 - 0.1;
                    this.speedY = Math.random() * 0.2 - 0.1;
                    this.color = `rgba(243, 205, 74, ${Math.random() * 0.3 + 0.2})`;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                        this.reset();
                    }
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        /* --- 2. Clean Execution Redirection Submission Handler --- */
        function initFormSubmission() {
            const form = document.getElementById("login-form");
            const errorBox = document.getElementById("error-box");
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");

            form.addEventListener("submit", (e) => {
                e.preventDefault();
                errorBox.style.display = "none";

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Simple baseline structural verification for mock flow
                if (password.length < 4) {
                    errorBox.textContent = "Authentication Error: Invalid credentials structure provided.";
                    errorBox.style.display = "block";
                    return;
                }

                // Temporary mock redirection matching the register structure
                // When Spring Boot API endpoints are alive, JWT logic hooks here!
                window.location.href = "dashboard.html";
            });
        }

        /* --- 3. Interactive Notification Action for Placeholder Triggers --- */
        function initForgotPasswordMock() {
            const trigger = document.getElementById("forgot-password-trigger");
            const errorBox = document.getElementById("error-box");

            if (!trigger || !errorBox) return;

            trigger.addEventListener("click", (e) => {
                e.preventDefault();
                errorBox.style.background = "rgba(212, 175, 55, 0.1)";
                errorBox.style.borderColor = "rgba(212, 175, 55, 0.3)";
                errorBox.style.color = "var(--gold-bright)";
                errorBox.textContent = "Recovery Flow: Please contact your group system administrator to reset credentials manually.";
                errorBox.style.display = "block";
            });
        }
    </script>
</body>
</html>
