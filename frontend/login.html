<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Akiba Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">🏦 Akiba Hub</div>
      <h2>Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" placeholder="+254712345678" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn-primary full-width">Login</button>
      </form>
      <p id="auth-message" class="message"></p>
      <p class="switch-page">Don't have an account? <a href="register.html">Register</a></p>
      <a href="index.html" class="text-link">← Back to Home</a>
    </div>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
