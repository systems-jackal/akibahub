<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Akiba Hub</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav>
        <h2>🗳️ Akiba Hub</h2>
        <div>
            <span id="userName">User</span>
            <button onclick="auth.logout()">Logout</button>
        </div>
    </nav>
    
    <div class="dashboard-container">
        <h1>Welcome, <span id="userNameDisplay"></span></h1>
        
        <div class="stats-grid">
            <div class="card" onclick="location.href='savings.html'">
                <div class="card-icon">💰</div>
                <h3>Personal Savings</h3>
                <p id="balanceDisplay">KES 0.00</p>
            </div>
            <div class="card" onclick="location.href='groups.html'">
                <div class="card-icon">👥</div>
                <h3>My Groups</h3>
                <p id="groupCount">0 Groups</p>
            </div>
            <div class="card" onclick="location.href='proposals.html'">
                <div class="card-icon">🗳️</div>
                <h3>Proposals</h3>
                <p id="proposalCount">0 Pending</p>
            </div>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        (function() {
            // Check authentication
            if (!auth.isAuthenticated()) {
                window.location.replace('login.html');
                return;
            }
            
            // Display user info
            const user = auth.getUser();
            document.getElementById('userNameDisplay').textContent = user?.email || 'User';
            document.getElementById('userName').textContent = user?.email || 'User';
            
            // Load balance
            (async function() {
                try {
                    const response = await api.getBalance();
                    if (response.success) {
                        document.getElementById('balanceDisplay').textContent = 
                            `KES ${parseFloat(response.data).toFixed(2)}`;
                    }
                } catch (e) {
                    console.error('Error loading balance:', e);
                }
            })();
        })();
    </script>
</body>
</html>
