<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Akiba Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div id="app" class="app">

    <!-- Top nav -->
    <header class="topnav">
      <div class="topnav-left">
        <div class="logo-sm">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="#FFF9FA" stroke-width="2" stroke-linecap="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="app-name">Akiba Hub</span>
      </div>
      <div class="topnav-right">
        <div class="avatar" id="user-avatar">?</div>
        <button class="btn-icon" onclick="api.auth.logout()" title="Sign out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main content -->
    <main class="main">

      <!-- Greeting -->
      <section class="section">
        <h1 class="greeting">Good day, <span id="user-name">...</span> 👋</h1>
        <p class="greeting-sub">Here's your financial overview</p>
      </section>

      <!-- Wallet summary -->
      <section class="section">
        <div class="card card-highlight">
          <div class="card-row">
            <div>
              <p class="card-label">Personal balance</p>
              <p class="card-amount" id="balance">KES —</p>
            </div>
            <div class="card-icon-wrap">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                   stroke="#fd1843" stroke-width="2" stroke-linecap="round">
                <rect x="2" y="5" width="20" height="14" rx="2"/>
                <path d="M2 10h20"/>
              </svg>
            </div>
          </div>
          <div class="stat-row">
            <div class="stat">
              <p class="stat-lbl">Deposited</p>
              <p class="stat-val" id="deposited">—</p>
            </div>
            <div class="stat">
              <p class="stat-lbl">Withdrawn</p>
              <p class="stat-val" id="withdrawn">—</p>
            </div>
          </div>
          <a href="wallet.html" class="btn btn-primary btn-full">Manage wallet</a>
        </div>
      </section>

      <!-- My groups -->
      <section class="section">
        <div class="section-header">
          <h2 class="section-title">My chamas</h2>
          <a href="groups.html" class="link-sm">See all</a>
        </div>
        <div id="groups-list">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
        <a href="groups.html" class="btn btn-secondary btn-full" style="margin-top:10px;">
          + Join or create a group
        </a>
      </section>

      <!-- Recent transactions -->
      <section class="section">
        <div class="section-header">
          <h2 class="section-title">Recent activity</h2>
          <a href="wallet.html" class="link-sm">See all</a>
        </div>
        <div id="tx-list">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </section>

    </main>

    <!-- Bottom nav -->
    <nav class="bottomnav">
      <a href="dashboard.html" class="bnav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>Home</span>
      </a>
      <a href="wallet.html" class="bnav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>
        </svg>
        <span>Wallet</span>
      </a>
      <a href="groups.html" class="bnav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/>
          <path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <span>Groups</span>
      </a>
      <a href="proposals.html" class="bnav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        <span>Votes</span>
      </a>
    </nav>

  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    const fmt = (n) => `KES ${Number(n).toLocaleString('en-KE', {minimumFractionDigits:2})}`;

    (async () => {
      const user = await initAuth();
      if (!requireAuth(user)) return;

      document.getElementById('user-name').textContent =
        user.displayName?.split(' ')[0] || user.email?.split('@')[0] || 'there';
      document.getElementById('user-avatar').textContent =
        (user.displayName || user.email || 'U')[0].toUpperCase();

      // Load wallet
      try {
        const w = await api.wallet.balance();
        document.getElementById('balance').textContent   = fmt(w.balance);
        document.getElementById('deposited').textContent = fmt(w.totalDeposited);
        document.getElementById('withdrawn').textContent = fmt(w.totalWithdrawn);
      } catch (e) {
        document.getElementById('balance').textContent = 'Could not load';
      }

      // Load groups
      try {
        const groups = await api.groups.list();
        const gl = document.getElementById('groups-list');
        if (!groups.length) {
          gl.innerHTML = `<p class="empty-state">No groups yet — join one with an invite code</p>`;
        } else {
          gl.innerHTML = groups.slice(0,3).map(g => `
            <a href="groups.html?id=${g.id}" class="list-item">
              <div class="list-item-icon" style="background:#FFD6DF;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="#fd1843" stroke-width="2" stroke-linecap="round">
                  <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                </svg>
              </div>
              <div class="list-item-body">
                <p class="list-item-title">${g.name}</p>
                <p class="list-item-sub">${fmt(g.groupWalletBalance)} · group wallet</p>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="#9B0026" stroke-width="2" stroke-linecap="round">
                <path d="M9 18l6-6-6-6"/>
              </svg>
            </a>
          `).join('');
        }
      } catch {}

      // Load recent transactions
      try {
        const txs = await api.wallet.transactions();
        const tl = document.getElementById('tx-list');
        const items = txs.content || [];
        if (!items.length) {
          tl.innerHTML = `<p class="empty-state">No transactions yet</p>`;
        } else {
          tl.innerHTML = items.slice(0,5).map(tx => `
            <div class="list-item">
              <div class="list-item-icon" style="background:${tx.type==='DEPOSIT'?'#FFD6DF':'#FFF0F3'};">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="#fd1843" stroke-width="2" stroke-linecap="round">
                  ${tx.type==='DEPOSIT'
                    ? '<line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>'
                    : '<line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>'}
                </svg>
              </div>
              <div class="list-item-body">
                <p class="list-item-title">${tx.description || tx.type}</p>
                <p class="list-item-sub">${new Date(tx.createdAt).toLocaleDateString('en-KE')}</p>
              </div>
              <p class="list-item-amount ${tx.type==='DEPOSIT'?'amount-in':'amount-out'}">
                ${tx.type==='DEPOSIT'?'+':'−'}${fmt(tx.amount)}
              </p>
            </div>
          `).join('');
        }
      } catch {}
    })();
  </script>
</body>
</html>
