<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings – Akiba Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="logo">🏦 Akiba Hub</div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="wallet.html">My Wallet</a>
      <a href="groups.html">Groups</a>
      <a href="proposals.html">Proposals</a>
      <a href="transactions.html">Transactions</a>
      <a href="settings.html" class="active">Settings</a>
      <a href="#" id="logout-btn">Logout</a>
    </nav>
  </aside>
  <main class="main-content">
    <h1>Settings</h1>
    <div class="card">
      <h3>Update Profile</h3>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullname">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <div class="phone-input">
          <span class="prefix">+254</span>
          <input type="tel" id="phone" data-phone>
        </div>
      </div>
      <button id="update-profile" class="btn-primary">Update Profile</button>
    </div>
    <div class="card mt-20">
      <h3>Change Password</h3>
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" id="current-password">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="new-password">
      </div>
      <button id="change-password" class="btn-primary">Change Password</button>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/settings.js"></script>
</body>
</html>
