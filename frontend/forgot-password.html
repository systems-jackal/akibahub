<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – Akiba Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">🏦 Akiba Hub</div>
      <h2>Reset Password</h2>
      <p class="auth-hint">Confirm the phone number and ID you registered with, then choose a new password.</p>

      <form id="forgot-form" autocomplete="on">
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <div class="phone-input">
            <span class="prefix">+254</span>
            <div class="input-wrapper" style="flex:1;">
              <div class="glow-ring"></div>
              <input type="tel" id="phone" data-phone placeholder="712 345 678" autocomplete="tel-national" required />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="idnumber">ID Number</label>
          <div class="input-wrapper">
            <div class="glow-ring"></div>
            <input type="text" id="idnumber" placeholder="8 digits" pattern="\d{8}" inputmode="numeric" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">New Password</label>
          <div class="password-wrapper input-wrapper">
            <div class="glow-ring"></div>
            <input type="password" id="password" autocomplete="new-password" required minlength="6" placeholder="At least 6 characters" />
            <button type="button" class="toggle-password" aria-label="Show password">👁️</button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm New Password</label>
          <div class="password-wrapper input-wrapper">
            <div class="glow-ring"></div>
            <input type="password" id="confirm-password" autocomplete="new-password" required minlength="6" placeholder="Re-enter new password" />
            <button type="button" class="toggle-password" aria-label="Show password">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn-primary full-width"><span class="wrap">Reset Password</span></button>
      </form>

      <p id="auth-message"></p>
      <p>Remembered it? <a href="login.html">Back to Login</a></p>
      <a href="index.html" class="btn-secondary full-width mt-20">← Back to Home</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/forgot-password.js"></script>
</body>
</html>
