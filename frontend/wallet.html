<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Wallet – Akiba Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="logo">🏦 Akiba<span>Hub</span></div>
    <nav>
      <a href="dashboard.html"><span class="icon">📊</span>Dashboard</a>
      <a href="wallet.html" class="active"><span class="icon">👛</span>My Wallet</a>
      <a href="groups.html"><span class="icon">👥</span>Groups</a>
      <a href="proposals.html"><span class="icon">📋</span>Proposals</a>
      <a href="transactions.html"><span class="icon">📈</span>Transactions</a>
      <a href="settings.html"><span class="icon">⚙️</span>Settings</a>
      <a href="#" id="logout-btn"><span class="icon">🚪</span>Logout</a>
    </nav>
  </aside>

  <main class="main-content">
    <h1>👛 My Wallet</h1>

    <div class="card">
      <h3>💰 Personal Balance</h3>
      <div class="stat-card">
        <div class="number" id="balance">0.00</div>
        <div class="label">KES</div>
      </div>

      <div class="flex gap-10 mt-20" style="flex-wrap: wrap;">
        <div class="input-wrapper" style="flex:1; min-width:160px;">
          <div class="glow-ring"></div>
          <input type="number" id="amount" placeholder="Amount (KES)" step="0.01" />
        </div>
        <button id="deposit-btn" class="btn-primary"><span class="wrap">➕ Deposit</span></button>
        <button id="withdraw-btn" class="btn-primary"><span class="wrap">➖ Withdraw</span></button>
      </div>
    </div>

    <div class="card mt-20">
      <h3>📋 Recent Transactions</h3>
      <div id="recent-transactions"></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/wallet.js"></script>
</body>
</html>
