<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Details – Akiba Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="logo">🏦 Akiba<span>Hub</span></div>
    <nav>
      <a href="dashboard.html" title="Dashboard"><span class="icon">📊</span><span class="label">Dashboard</span></a>
      <a href="wallet.html" title="My Wallet"><span class="icon">👛</span><span class="label">My Wallet</span></a>
      <a href="groups.html" title="Groups"><span class="icon">👥</span><span class="label">Groups</span></a>
      <a href="proposals.html" title="Proposals"><span class="icon">📋</span><span class="label">Proposals</span></a>
      <a href="transactions.html" title="Transactions"><span class="icon">📈</span><span class="label">Transactions</span></a>
      <a href="settings.html" title="Settings"><span class="icon">⚙️</span><span class="label">Settings</span></a>
      <a href="#" id="logout-btn" title="Logout"><span class="icon">🚪</span><span class="label">Logout</span></a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="ledger-ticker">
      <span><span class="dot"></span> LEDGER: SYNCED</span>
      <span class="sep">·</span>
      <span id="ticker-time">--:--:--</span>
      <span class="cursor-block"></span>
    </div>

    <h1 id="group-name">Loading Group…</h1>
    <p id="group-desc" class="text-muted"></p>

    <div id="group-rules-box" class="card hidden">
      <h3>📜 Group Rules</h3>
      <p id="group-rules-text"></p>
    </div>

    <div class="card mt-20 card--accent-orange">
      <h3>💰 Group Wallet</h3>
      <p class="stat-number">KES <span id="group-balance">0.00</span></p>
      <button id="contribute-btn" class="btn-primary mt-10">➕ Contribute</button>
    </div>

    <div class="card mt-20 analytics-panel">
      <h3>📈 Growth Over Time</h3>
      <div id="group-growth-chart" class="chart-container">
        <div class="loader-inline"><span class="matrix-loader"><span></span><span></span><span></span><span></span><span></span></span> LOADING_LEDGER_HISTORY</div>
      </div>
    </div>

    <div id="invite-section" class="card mt-20 hidden">
      <h3>🔗 Invite Members</h3>
      <p>Invite Code: <strong id="invite-code-display"></strong></p>
      <button id="copy-invite" class="btn-primary btn-sm"><span class="wrap">📋 Copy Code</span></button>
    </div>

    <div class="card mt-20">
      <h3>👤 Members (<span id="member-count">0</span>)</h3>
      <button id="toggle-members" class="btn-secondary btn-sm">View Members</button>
      <div id="members-list" class="hidden mt-10"></div>
    </div>

    <div class="card mt-20">
      <h3>📋 Proposals</h3>
      <div id="proposals-list"></div>
      <button id="new-proposal-btn" class="btn-primary mt-20"><span class="wrap">➕ New Proposal</span></button>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/group.js"></script>
</body>
</html>
