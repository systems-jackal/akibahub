<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group – Akiba Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard-container">
    <header class="dashboard-header">
      <div class="logo"><a href="dashboard.html">🏦 Akiba Hub</a></div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="#" id="logout-btn">Logout</a>
      </nav>
    </header>

    <div id="group-detail">
      <h2 id="group-name"></h2>
      <p id="group-desc"></p>
      <p><strong>Group Wallet Balance:</strong> <span id="group-balance">0.0000</span></p>

      <div class="card">
        <h3>Members</h3>
        <div id="members-list"></div>
      </div>

      <div class="card">
        <h3>Proposals</h3>
        <div id="proposals-list"></div>
      </div>

      <div class="card">
        <h3>Actions</h3>
        <button id="contribute-btn" class="btn-primary">Contribute to Group</button>
        <button id="new-proposal-btn" class="btn-primary">New Proposal</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/pages/group.js"></script>
</body>
</html>
