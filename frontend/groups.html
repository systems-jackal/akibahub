<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groups - Akiba Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="logo">🏦 Akiba Hub</div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="wallet.html">My Wallet</a>
      <a href="groups.html" class="active">Groups</a>
      <a href="proposals.html">Proposals</a>
      <a href="transactions.html">Transactions</a>
      <a href="settings.html">Settings</a>
      <a href="#" id="logout-btn">Logout</a>
    </nav>
  </aside>
  <main class="main-content">
    <h1>My Groups</h1>
    <div class="card">
      <h3>Create New Group</h3>
      <div class="form-group">
        <input type="text" id="group-name" placeholder="Group Name">
      </div>
      <div class="form-group">
        <input type="text" id="group-desc" placeholder="Description (optional)">
      </div>
      <button id="create-btn" class="btn-primary">Create Group</button>
    </div>
    <div class="card mt-20">
      <h3>Join Existing Group</h3>
      <div class="form-group">
        <input type="number" id="join-group-id" placeholder="Group ID">
      </div>
      <button id="join-btn" class="btn-primary">Join</button>
    </div>
    <div id="groups-list" class="mt-20"></div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/groups.js"></script>
</body>
</html>
