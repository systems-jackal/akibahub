<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groups – Akiba Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="logo">🏦 Akiba<span>Hub</span></div>
    <nav>
      <a href="dashboard.html" title="Dashboard"><span class="icon">📊</span><span class="label">Dashboard</span></a>
      <a href="wallet.html" title="My Wallet"><span class="icon">👛</span><span class="label">My Wallet</span></a>
      <a href="groups.html" class="active" title="Groups"><span class="icon">👥</span><span class="label">Groups</span></a>
      <a href="proposals.html" title="Proposals"><span class="icon">📋</span><span class="label">Proposals</span></a>
      <a href="transactions.html" title="Transactions"><span class="icon">📈</span><span class="label">Transactions</span></a>
      <a href="settings.html" title="Settings"><span class="icon">⚙️</span><span class="label">Settings</span></a>
      <a href="#" id="logout-btn" title="Logout"><span class="icon">🚪</span><span class="label">Logout</span></a>
    </nav>
  </aside>

  <main class="main-content">
    <h1>My Groups</h1>

    <div class="card">
      <h3>✨ Create New Group</h3>
      <div class="form-group">
        <label for="group-name">Group Name</label>
        <div class="input-wrapper">
          <div class="glow-ring"></div>
          <input type="text" id="group-name" placeholder="e.g. Campus Chama" />
        </div>
      </div>
      <div class="form-group">
        <label for="group-desc">Description (optional)</label>
        <div class="input-wrapper">
          <div class="glow-ring"></div>
          <input type="text" id="group-desc" placeholder="What's this group about?" />
        </div>
      </div>
      <div class="form-group">
        <label for="group-rules">Group Rules</label>
        <div class="input-wrapper">
          <div class="glow-ring"></div>
          <textarea id="group-rules" placeholder="e.g. Monthly contribution KES 500, voting rules…" rows="3"></textarea>
        </div>
      </div>
      <button id="create-btn" class="btn-primary"><span class="wrap">🚀 Create Group</span></button>

      <div id="invite-code-area" class="hidden mt-20">
        <p><strong>Invite Code:</strong> <span id="generated-code" class="invite-code"></span></p>
        <button id="copy-code" class="btn-primary btn-sm"><span class="wrap">📋 Copy Code</span></button>
      </div>
    </div>

    <div class="card mt-20">
      <h3>🔑 Join Existing Group</h3>
      <div class="form-group">
        <label for="join-invite-code">Enter 6‑Character Invite Code</label>
        <div class="input-wrapper">
          <div class="glow-ring"></div>
          <input type="text" id="join-invite-code" placeholder="e.g. A1B2C3" maxlength="6" />
        </div>
      </div>
      <button id="join-btn" class="btn-primary"><span class="wrap">➕ Join Group</span></button>
    </div>

    <div id="groups-list" class="mt-20"></div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/groups.js"></script>
</body>
</html>
