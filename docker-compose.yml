# Local development compose — publishes MariaDB to the host for tooling.
# Production topology is docker-compose.prod.yml (DB not published).
services:
  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-akibahub}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - akiba-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${MYSQL_DATABASE:-akibahub}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-long-random-secret-key!!}
      PAYMENTS_MODE: ${PAYMENTS_MODE:-demo}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    networks:
      - akiba-net
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

networks:
  akiba-net:

volumes:
  db_data:
