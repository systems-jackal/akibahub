server:
  port: 8083

spring:
  application:
    name: group-service
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:3306/${DB_NAME:akiba_groups}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

audit:
  exchange: akibahub.events
  routing-key: audit.group

invite:
  code:
    length: 8
    expiry-hours: 48

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
