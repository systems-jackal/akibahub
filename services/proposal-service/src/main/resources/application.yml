server:
  port: 8085

spring:
  application:
    name: proposal-service
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:3306/${DB_NAME:akiba_proposals}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

audit:
  exchange: akibahub.events
  routing-key: audit.proposal

services:
  group:
    url: http://${GROUP_SERVICE_HOST:localhost}:8083
  payment:
    url: http://${PAYMENT_SERVICE_HOST:localhost}:8084
  internal-key: ${INTERNAL_SERVICE_KEY:dev-internal-key}

proposal:
  voting:
    default-threshold-percent: 51
    default-duration-hours: 72

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
