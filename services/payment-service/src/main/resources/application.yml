server:
  port: 8084

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:3306/${DB_NAME:akiba_payments}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

payhero:
  api:
    url: https://backend.payhero.co.ke/api/v2
    username: ${PAYHERO_USERNAME}
    password: ${PAYHERO_PASSWORD}
    channel-id: ${PAYHERO_CHANNEL_ID}
    callback-url: ${APP_BASE_URL:http://localhost:8084}/payments/callback

audit:
  exchange: akibahub.events
  routing-key: audit.payment

payment:
  events:
    exchange: akibahub.events
    savings-routing-key: payment.savings
    group-routing-key: payment.group

services:
  savings:
    url: http://${SAVINGS_SERVICE_HOST:localhost}:8082
  group:
    url: http://${GROUP_SERVICE_HOST:localhost}:8083
  internal-key: ${INTERNAL_SERVICE_KEY:dev-internal-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
