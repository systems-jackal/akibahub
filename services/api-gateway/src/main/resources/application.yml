server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/auth/**

        - id: oauth2-authorization
          uri: http://${AUTH_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/oauth2/**

        - id: login-oauth2
          uri: http://${AUTH_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/login/**

        - id: savings-service
          uri: http://${SAVINGS_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/savings/**
          filters:
            - AuthenticationFilter

        - id: group-service
          uri: http://${GROUP_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/groups/**
          filters:
            - AuthenticationFilter

        - id: payment-callback
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/payments/callback/**

        - id: payment-service
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/payments/**
          filters:
            - AuthenticationFilter

        - id: proposal-service
          uri: http://${PROPOSAL_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/proposals/**
          filters:
            - AuthenticationFilter

        - id: audit-service
          uri: http://${AUDIT_SERVICE_HOST:localhost}:8086
          predicates:
            - Path=/audit/**
          filters:
            - AuthenticationFilter

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - ${FRONTEND_URL:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
